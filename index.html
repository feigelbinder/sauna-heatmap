<!DOCTYPE html>
<html lang='de'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Sauna Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui;padding:12px;max-width:1400px;margin:0 auto}
h1{font-size:20px;margin-bottom:4px}
.m{font-size:10px;color:#8b949e;margin-bottom:10px}
.badge{padding:2px 6px;border-radius:4px;background:rgba(63,185,80,.15);color:#3fb950;font-size:10px}
.nw{margin-bottom:10px}
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.nc{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 10px;position:relative;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.nc:hover{border-color:#58a6ff}
.nc.sel{border-color:#58a6ff;box-shadow:0 0 10px rgba(88,166,255,.25)}
.nc.top{border-color:#3fb950;box-shadow:0 0 10px rgba(63,185,80,.2)}
.nc .p{font-size:20px;font-weight:700;margin-bottom:1px}
.nc .n{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc .s{font-size:9px;color:#8b949e}
.nc .go{position:absolute;top:4px;right:4px;font-size:7px;background:#3fb950;color:#000;padding:1px 4px;border-radius:3px;font-weight:700}
.tbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.tog{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #30363d;background:#161b22;color:#8b949e;transition:all .15s;user-select:none;-webkit-user-select:none}
.tog.on{background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.4);color:#c9d1d9}
.tog .dot{width:6px;height:6px;border-radius:50%;background:#30363d;transition:background .15s}
.tog.on .dot{background:#58a6ff}
.pill-g{display:flex;border:1px solid #30363d;border-radius:6px;overflow:hidden}
.pill{padding:4px 10px;font-size:11px;cursor:pointer;background:#161b22;color:#8b949e;border:none;font-family:inherit}
.pill.act{background:#58a6ff;color:#fff}
button{background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer}
.hw{overflow-x:auto;padding-bottom:4px;position:relative}
table{border-collapse:separate;border-spacing:2px;width:100%;table-layout:fixed}
th{font-size:9px;color:#8b949e;font-weight:400;text-align:center;padding:2px}
.dl{font-size:11px;font-weight:600;padding-right:4px;text-align:right;vertical-align:middle;white-space:nowrap}
.sc{padding:0 4px 0 0;vertical-align:middle}
.tl{font-size:10px;color:#8b949e;padding-right:6px;text-align:right;position:sticky;left:0;background:#0d1117;z-index:1}
.c{border-radius:3px;text-align:center;font-size:9px;font-weight:500;cursor:pointer;position:relative;height:24px}
.c:hover{outline:2px solid #58a6ff;outline-offset:-1px}
.c.e{cursor:default;background:rgba(255,255,255,.02)}.c.e:hover{outline:none}
.c.dam{cursor:default;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 3px,rgba(255,255,255,.06) 3px,rgba(255,255,255,.06) 6px)!important;color:rgba(255,255,255,.25)!important}.c.dam:hover{outline:none}
.c.low{outline:1px dashed rgba(255,255,255,.2);outline-offset:-1px;opacity:.7}
.bw-overlay{position:absolute;border:2px solid #e3b341;border-radius:6px;pointer-events:none;z-index:2;box-shadow:0 0 10px rgba(227,179,65,.25),inset 0 0 10px rgba(227,179,65,.08)}
.lg{display:flex;align-items:center;gap:6px;margin:8px 0 14px;font-size:10px;color:#8b949e;flex-wrap:wrap}
.lb{display:flex;height:12px;border-radius:3px;overflow:hidden;width:140px}
.bx{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;max-width:700px;margin-bottom:12px}
.bx h3{font-size:13px;margin-bottom:8px}
.bg{display:grid;grid-template-columns:1fr;gap:6px}
.bi{display:flex;align-items:center;gap:8px;padding:8px;background:#0d1117;border-radius:8px;border:1px solid #30363d}
.bb{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.bt{font-size:12px;font-weight:600}.bs{font-size:10px;color:#8b949e}
.tp{position:fixed;z-index:99;background:#1c2333;border:1px solid #30363d;border-radius:8px;padding:10px;font-size:11px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;min-width:150px}
.tp.show{display:block}.tp b{display:block;margin-bottom:4px;font-size:12px}
.damens{font-size:9px;color:#e3b341;margin-left:4px}
.ft{margin-top:16px;font-size:9px;color:#8b949e;text-align:center}
@media(min-width:640px){body{padding:16px 32px;max-width:1400px;margin:0 auto}.bg{grid-template-columns:1fr 1fr}.ng{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.c{font-size:10px;height:28px}.tbar{gap:8px}}
@media(min-width:1100px){.ng{grid-template-columns:repeat(7,1fr)}.bg{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id='a'></div>
<div class='tp' id='tp'></div>
<script>
var API='https://script.google.com/macros/s/AKfycbxpjTpkOgwSW_b6Jrk0CwokHlG6YYy9JMcEBlqPsr2_D-LY2fLDOxSuw14SACfdRaY/exec';
var TICOS='https://counter.ticos-systems.cloud/api/gates/counter';
var SWM=[{id:'30191',n:'Cosimawellenbad'},{id:'30200',n:'Dantebad'},{id:'30203',n:'Michaelibad'},{id:'30204',n:'Muellersches Volksbad'},{id:'30185',n:'Nordbad'},{id:'30188',n:'Suedbad'},{id:'30207',n:'Westbad'}];
var DAYS=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
var DS=['Mo','Di','Mi','Do','Fr','Sa','So'];
var TS=[];for(var h=7;h<24;h++){TS.push(pad(h)+':00');TS.push(pad(h)+':30');}
var BAYERN='01.01.2026, 06.01.2026, 03.04.2026, 06.04.2026, 01.05.2026, 14.05.2026, 25.05.2026, 04.06.2026, 15.08.2026, 03.10.2026, 01.11.2026, 25.12.2026, 26.12.2026';
var WIN=8;var raw=[];var liveNow=null;var sel='Michaelibad';var exclOn=false;var showBW=true;var showConf=false;var wFilt='all';var weatherMap=null;
var DAMEN={Cosimawellenbad:[{d:'Montag'}],Dantebad:[{d:'Montag'}],Michaelibad:[{d:'Dienstag'}],'Muellersches Volksbad':[{d:'Dienstag'},{d:'Freitag',from:'09:00',to:'15:00'}],Nordbad:[{d:'Mittwoch'}],Westbad:[{d:'Mittwoch'}],Suedbad:[{d:'Donnerstag'}]};
var DAMEN_TXT={Cosimawellenbad:'Mo 9-23',Dantebad:'Mo 7:30-23',Michaelibad:'Di 7:30-23','Muellersches Volksbad':'Di 9-23, Fr 9-15',Nordbad:'Mi 7:30-23',Westbad:'Mi 7:30-23',Suedbad:'Do 9-23'};

function pad(n){return n<10?'0'+n:''+n;}
function clr(v){if(v==null||isNaN(v))return'rgba(255,255,255,.04)';v=Math.max(0,Math.min(100,v));return'hsl('+(120-v*1.2)+','+(65+v*.25)+'%,'+(28+v*.22)+'%)';}
function tc(v){return v>60?'rgba(255,255,255,.95)':'rgba(255,255,255,.8)';}
function exTime(v){if(v==null)return null;var s=String(v).trim();if(s.indexOf('T')>3||/^\d{4}-\d{2}-\d{2}\s/.test(s)){var m2=s.match(/(\d{2}):(\d{2})(?::|\s|$)/);if(m2){if(/^\d{4}-\d{2}-\d{2}\s/.test(s))return floorT(parseInt(m2[1]),parseInt(m2[2]));var d=new Date(s);if(!isNaN(d))return floorT(d.getHours(),d.getMinutes());}return null;}var p=s.replace(/\s*uhr/i,'').split(':');if(p.length>=2){var hh=parseInt(p[0]),mm=parseInt(p[1]);if(!isNaN(hh)&&!isNaN(mm))return floorT(hh,mm);}return null;}
function floorT(h,m){if(h<0||h>=24)return null;return pad(h)+':'+(m>=30?'30':'00');}
function exDay(v){if(v==null)return null;var s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s);if(!isNaN(d))return DAYS[[6,0,1,2,3,4,5][d.getDay()]];}var l=s.toLowerCase();var en={monday:0,tuesday:1,wednesday:2,thursday:3,friday:4,saturday:5,sunday:6};if(en[l]!=null)return DAYS[en[l]];for(var i=0;i<DAYS.length;i++){if(DAYS[i].toLowerCase()===l||DAYS[i].toLowerCase().indexOf(l.slice(0,3))===0)return DAYS[i];}return null;}
function exDatum(v){if(v==null)return null;var s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s)){var p=s.split(/[-T\s]/);if(p.length>=3)return p[2]+'.'+p[1]+'.'+p[0];}return s;}
function fCol(row,names){var ks=Object.keys(row);for(var i=0;i<names.length;i++){if(row[names[i]]!=null)return names[i];}for(var i=0;i<names.length;i++){for(var j=0;j<ks.length;j++){if(ks[j].toLowerCase().replace(/[^a-z0-9]/g,'').indexOf(names[i].toLowerCase().replace(/[^a-z0-9]/g,''))>=0)return ks[j];}}return null;}
function addSlots(t,n){var p=t.split(':');var hh=parseInt(p[0]),mm=parseInt(p[1])+n*30;hh+=Math.floor(mm/60);mm=mm%60;return pad(hh)+':'+pad(mm);}
function isDam(sa,day,time){var dd=DAMEN[sa];if(!dd)return false;for(var i=0;i<dd.length;i++){if(dd[i].d===day){if(!dd[i].from)return true;if(time>=dd[i].from&&time<dd[i].to)return true;}}return false;}
function isDamDay(sa,day){var dd=DAMEN[sa];if(!dd)return false;for(var i=0;i<dd.length;i++){if(dd[i].d===day)return true;}return false;}

function fetchAll(){
  document.getElementById('a').innerHTML='<div style=\'text-align:center;padding:30vh 0\'><div style=\'font-size:48px\'>&#x1f9d6;</div><div>Lade Daten...</div></div>';
  fetch(API,{redirect:'follow'}).then(function(r){return r.text();}).then(function(t){
    var data=JSON.parse(t);if(!Array.isArray(data)||data.length===0)throw new Error('Keine Daten');
    raw=data;return Promise.all([fetchLiveP(),fetchWeatherP()]);
  }).then(function(){render();}).catch(function(e){
    document.getElementById('a').innerHTML='<div style=\'text-align:center;padding:20vh 20px\'><div style=\'font-size:36px\'>&#x26A0;&#xFE0F;</div><div style=\'margin:12px 0\'>'+e.message+'</div><button onclick=\'fetchAll()\' style=\'background:#58a6ff;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px\'>Retry</button></div>';
  });
}
function fetchLiveP(){var ps=SWM.map(function(s){return fetch(TICOS+'?organizationUnitIds='+s.id).then(function(r){return r.json();}).then(function(d){if(d&&d[0])return{name:s.n,cur:d[0].personCount,max:d[0].maxPersonCount,pct:Math.round(d[0].personCount/d[0].maxPersonCount*100)};return null;}).catch(function(){return null;});});return Promise.all(ps).then(function(res){liveNow=res.filter(Boolean);if(!liveNow.length)liveNow=null;});}
function fetchWeatherP(){return fetch('https://api.open-meteo.com/v1/forecast?latitude=48.14&longitude=11.58&daily=precipitation_sum&timezone=Europe/Berlin&past_days=30&forecast_days=2').then(function(r){return r.json();}).then(function(d){if(!d.daily)return;weatherMap={};d.daily.time.forEach(function(t,i){var parts=t.split('-');if(parts.length===3){var k=parts[2]+'.'+parts[1]+'.'+parts[0];var precip=d.daily.precipitation_sum[i];weatherMap[k]={precip:precip!=null?precip:0,rain:(precip!=null&&precip>2)};}});}).catch(function(){weatherMap=null;});}

function process(){
  if(!raw.length)return{saunas:[],hm:{},bestW:[],bestKey:null,damenRules:[],stats:{}};
  var r0=raw[0];var cS=fCol(r0,['Sauna']),cD=fCol(r0,['Wochentag']),cT=fCol(r0,['Uhrzeit']),cDt=fCol(r0,['Datum']),cP=fCol(r0,['Personen']),cM=fCol(r0,['Max Kapazitaet']);
  var exSet={};if(exclOn){BAYERN.split(',').forEach(function(d){d=d.trim();if(d)exSet[d]=true;});}
  var saunaSet={};raw.forEach(function(row){if(row[cS])saunaSet[row[cS]]=true;});
  var saunas=Object.keys(saunaSet).sort();
  var fd=raw.filter(function(row){
    if(Object.keys(exSet).length>0&&cDt){var dt=exDatum(row[cDt]);if(dt&&exSet[dt])return false;}
    if(sel!=='__all__'&&row[cS]!==sel)return false;
    if(wFilt!=='all'&&weatherMap&&cDt){var dt=exDatum(row[cDt]);var w=dt?weatherMap[dt]:null;if(w){if(wFilt==='sun'&&w.rain)return false;if(wFilt==='rain'&&!w.rain)return false;}}
    return true;
  });
  var grp={};
  fd.forEach(function(row){var day=exDay(cD?row[cD]:null),time=exTime(cT?row[cT]:null);if(!day||!time)return;var pers=Number(row[cP]);var maxC=Number(row[cM]);if(isNaN(pers)||isNaN(maxC)||maxC<=0)return;var pct=Math.round(pers/maxC*100);var k=day+'|'+time;if(!grp[k])grp[k]=[];grp[k].push(pct);});
  var hm={};var keys=Object.keys(grp);
  for(var i=0;i<keys.length;i++){var vs=grp[keys[i]];var sum=0;for(var j=0;j<vs.length;j++)sum+=vs[j];hm[keys[i]]={avg:Math.round(sum/vs.length),min:Math.min.apply(null,vs),max:Math.max.apply(null,vs),n:vs.length};}
  var damenRules=(sel!=='__all__')?(DAMEN[sel]||[]):[];
  var allW=[];
  for(var di=0;di<DAYS.length;di++){for(var ti=0;ti<=TS.length-WIN;ti++){var vals=[],ok=true;for(var j=0;j<WIN;j++){if(sel!=='__all__'&&isDam(sel,DAYS[di],TS[ti+j])){ok=false;break;}var c=hm[DAYS[di]+'|'+TS[ti+j]];if(!c||c.avg<=0){ok=false;break;}vals.push(c.avg);}if(!ok||vals.length<WIN)continue;var s=0;for(var j=0;j<vals.length;j++)s+=vals[j];allW.push({day:DAYS[di],di:di,ti:ti,from:TS[ti],to:addSlots(TS[ti],WIN),avg:Math.round(s/vals.length),min:Math.min.apply(null,vals),max:Math.max.apply(null,vals),profile:vals});}}
  allW.sort(function(a,b){return a.avg-b.avg;});
  var bestW=[];var maxOv=Math.floor(WIN/2);
  for(var i=0;i<allW.length&&bestW.length<6;i++){var w=allW[i];var tooClose=false;for(var j=0;j<bestW.length;j++){if(bestW[j].di!==w.di)continue;var oS=Math.max(w.ti,bestW[j].ti);var oE=Math.min(w.ti+WIN,bestW[j].ti+WIN);if(oE-oS>maxOv){tooClose=true;break;}}if(!tooClose)bestW.push(w);}
  var bestKey=bestW.length>0?{day:bestW[0].day,di:bestW[0].di,from:bestW[0].ti,to:bestW[0].ti+WIN}:null;
  var allDt=fd.map(function(r){return exDatum(r[cDt]);}).filter(Boolean).sort();
  return{saunas:saunas,hm:hm,bestW:bestW,bestKey:bestKey,damenRules:damenRules,stats:{rows:fd.length,from:allDt[0]||'',to:allDt[allDt.length-1]||''}};
}

function miniBar(p){var mx=Math.max.apply(null,p)||1;return p.map(function(v){var h=Math.max(2,Math.round(v/mx*16));return'<div style=\'width:4px;height:'+h+'px;background:'+clr(v)+';border-radius:1px\'></div>';}).join('');}
function spark(hm,day,w,h){var vals=[];for(var i=0;i<TS.length;i++){var c=hm[day+'|'+TS[i]];vals.push(c&&c.avg>0?c.avg:0);}if(vals.every(function(v){return v===0;}))return'';var mx=Math.max.apply(null,vals)||1;var pts='';for(var i=0;i<vals.length;i++){pts+=(pts?',':'')+Math.round((i/(vals.length-1))*w)+','+(h-1-Math.round((vals[i]/mx)*(h-2)));}return'<svg width=\''+w+'\' height=\''+h+'\' style=\'vertical-align:middle;opacity:.6\'><polyline points=\''+pts+'\' fill=\'none\' stroke=\'#58a6ff\' stroke-width=\'1.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\'/></svg>';}
function cellH(hm,day,time,isDamen){var c=hm[day+'|'+time];if(isDamen)return'<td class=\'c dam\' title=\'Damensauna\'>&#x2640;</td>';if(!c||c.avg<=0)return'<td class=\'c e\'></td>';var cls='c';if(showConf&&c.n<2)cls+=' low';return'<td class=\''+cls+'\' style=\'background:'+clr(c.avg)+';color:'+tc(c.avg)+'\' data-d=\''+day+'\' data-t=\''+time+'\' data-a=\''+c.avg+'\' data-mi=\''+c.min+'\' data-mx=\''+c.max+'\' data-n=\''+c.n+'\' id=\'c_'+day+'_'+time.replace(':','')+'\'>'+ c.avg+'</td>';}
function isBestCell(bk,di,ti){if(!bk)return false;return DAYS[di]===bk.day&&ti>=bk.from&&ti<bk.to;}
function getLatest(){if(!raw.length)return[];var r0=raw[0];var cS=fCol(r0,['Sauna']),cDt=fCol(r0,['Datum']),cT=fCol(r0,['Uhrzeit']),cP=fCol(r0,['Personen']),cM=fCol(r0,['Max Kapazitaet']);var lk='',lr=[];raw.forEach(function(row){var dt=exDatum(row[cDt])||'',tm=exTime(row[cT])||'',k=dt+'|'+tm;if(k>lk){lk=k;lr=[row];}else if(k===lk)lr.push(row);});return lr.map(function(row){var p=Number(row[cP])||0;var mx=Number(row[cM])||1;return{name:row[cS],cur:p,max:mx,pct:Math.round(p/mx*100)};}).filter(function(r){return r.name;});}
function getLastPerSauna(){if(!raw.length)return{};var r0=raw[0];var cS=fCol(r0,['Sauna']),cDt=fCol(r0,['Datum']);var map={};raw.forEach(function(row){var name=row[cS];if(!name)return;var dt=exDatum(row[cDt])||'';if(!map[name])map[name]={from:dt,to:dt,n:0};map[name].n++;if(dt<map[name].from)map[name].from=dt;if(dt>map[name].to)map[name].to=dt;});return map;}

function render(){
  var d=process();var now=new Date().toLocaleTimeString('de-DE');var mobile=window.innerWidth<640;
  var hasW=weatherMap&&Object.keys(weatherMap).length>0;var o='';
  o+='<h1>&#x1f9d6; Sauna Heatmap</h1>';
  o+='<div class=\'m\'><span class=\'badge\'>&#x1f534; Live</span> '+now;
  if(d.stats.from)o+=' &middot; '+d.stats.from+' &ndash; '+d.stats.to;
  o+=' <button onclick=\'fetchAll()\'>&#x21bb;</button></div>';

  // Live cards
  var live=[];var sheetLatest=getLatest();var lastPS=getLastPerSauna();var seen={};
  for(var i=0;i<sheetLatest.length;i++){var s=sheetLatest[i];if(!seen[s.name]){seen[s.name]=true;live.push({name:s.name,cur:s.cur,max:s.max,pct:s.pct,rt:false});}}
  if(liveNow){for(var i=0;i<liveNow.length;i++){var l=liveNow[i];var found=false;for(var j=0;j<live.length;j++){if(live[j].name===l.name){live[j].cur=l.cur;live[j].max=l.max;live[j].pct=l.pct;live[j].rt=true;found=true;break;}}if(!found){seen[l.name]=true;live.push({name:l.name,cur:l.cur,max:l.max,pct:l.pct,rt:true});}}}
  if(live.length){
    live.sort(function(a,b){return a.pct-b.pct;});
    o+='<div style=\'font-size:12px;font-weight:600;margin-bottom:4px\'>&#x1f680; Jetzt gehen?</div><div class=\'nw\'><div class=\'ng\'>';
    for(var i=0;i<live.length;i++){var s=live[i];var lp=lastPS[s.name];var tip=s.rt?'Echtzeit via API':'Letzte Messung';if(lp)tip+=' | Heatmap: '+lp.from+' - '+lp.to+' ('+lp.n+' Punkte)';
      o+='<div class=\'nc'+(i===0?' top':'')+(s.name===sel?' sel':'')+'\' onclick=\'pick(this)\' data-name=\''+s.name+'\' title=\''+tip+'\'><div class=\'p\' style=\'color:'+clr(s.pct)+'\'>'+s.pct+'%</div><div class=\'n\'>'+s.name+'</div><div class=\'s\'>'+s.cur+'/'+s.max+(s.rt?' &#x1f7e2;':'')+'</div>'+(i===0?'<div class=\'go\'>GO!</div>':'')+'</div>';}
    o+='</div></div>';
  }

  // Toolbar
  var dt=DAMEN_TXT[sel];
  o+='<div class=\'tbar\'><div class=\'tog'+(exclOn?' on':'')+'\' id=\'tExcl\'><span class=\'dot\'></span>Feiertage raus</div><div class=\'tog'+(showBW?' on':'')+'\' id=\'tBW\'><span class=\'dot\'></span>&#x2B50; Top Fenster</div><div class=\'tog'+(showConf?' on':'')+'\' id=\'tConf\'><span class=\'dot\'></span>Konfidenz</div>';
  if(hasW){o+='<div class=\'pill-g\'><button class=\'pill'+(wFilt==='all'?' act':'')+'\' data-w=\'all\'>Alle</button><button class=\'pill'+(wFilt==='sun'?' act':'')+'\' data-w=\'sun\'>&#x2600;&#xFE0F;</button><button class=\'pill'+(wFilt==='rain'?' act':'')+'\' data-w=\'rain\'>&#x1f327;&#xFE0F;</button></div>';}
  o+='</div>';
  if(dt)o+='<div style=\'font-size:10px;color:#e3b341;margin-bottom:10px\'>&#x2640; Damensauna: '+dt+'</div>';

  // Heatmap
  o+='<div class=\'hw\' id=\'hw\'>';
  if(mobile){
    o+='<table id=\'ht\'><thead><tr><th class=\'tl\'></th>';for(var i=0;i<DAYS.length;i++)o+='<th style=\'font-size:11px;font-weight:600;padding:4px 2px\'>'+DS[i]+'</th>';o+='</tr></thead><tbody>';
    for(var ti=0;ti<TS.length;ti++){var isH=TS[ti].indexOf(':00')>=0;o+='<tr><td class=\'tl\''+(isH?' style=\'font-weight:600;color:#c9d1d9\'':'')+'>'+( isH?TS[ti]:'')+'</td>';for(var di=0;di<DAYS.length;di++){var dam=sel!=='__all__'&&isDam(sel,DAYS[di],TS[ti]);o+=cellH(d.hm,DAYS[di],TS[ti],dam);}o+='</tr>';}
    o+='</tbody></table>';
  }else{
    o+='<table id=\'ht\'><thead><tr><th></th><th></th>';for(var ti=0;ti<TS.length;ti++)o+='<th>'+(TS[ti].indexOf(':00')>=0?TS[ti].slice(0,-3):'')+'</th>';o+='</tr></thead><tbody>';
    for(var di=0;di<DAYS.length;di++){var has=false;for(var ti=0;ti<TS.length;ti++){var c=d.hm[DAYS[di]+'|'+TS[ti]];if(c&&c.avg>0)has=true;}var dayHasDam=sel!=='__all__'&&isDamDay(sel,DAYS[di]);
      o+='<tr><td class=\'dl\' style=\'opacity:'+(has||dayHasDam?1:.3)+'\'>'+DS[di]+(dayHasDam?'<span style=\'color:#e3b341;font-size:8px\'> &#x2640;</span>':'')+'</td><td class=\'sc\'>'+spark(d.hm,DAYS[di],50,14)+'</td>';
      for(var ti=0;ti<TS.length;ti++){var dam=sel!=='__all__'&&isDam(sel,DAYS[di],TS[ti]);o+=cellH(d.hm,DAYS[di],TS[ti],dam);}o+='</tr>';}
    o+='</tbody></table>';
  }
  o+='</div>';

  // Legend
  var lp='';for(var i=0;i<20;i++)lp+='<div style=\'flex:1;background:'+clr(i*5)+'\'></div>';
  o+='<div class=\'lg\'><span>0%</span><div class=\'lb\'>'+lp+'</div><span>100%</span><span style=\'color:#3fb950\'>&#9632; leer</span> <span style=\'color:hsl(60,81%,34%)\'>&#9632; mittel</span> <span style=\'color:hsl(0,90%,50%)\'>&#9632; voll</span>';
  if(showConf)o+='<span style=\'opacity:.7;outline:1px dashed rgba(255,255,255,.2);outline-offset:-1px;padding:0 4px;border-radius:2px;font-size:9px\'>1x</span>';
  o+='<span class=\'c dam\' style=\'width:auto;padding:0 4px;font-size:10px;display:inline-block;cursor:default\'>&#x2640;</span></div>';

  // Best windows
  if(d.bestW.length){var med=['&#x1f947;','&#x1f948;','&#x1f949;','4.','5.','6.'];
    o+='<div class=\'bx\'><h3>&#x1f3af; Beste 4h-Fenster'+(sel!=='__all__'?' &middot; '+sel:'')+'</h3>';
    if(d.damenRules&&d.damenRules.length)o+='<div style=\'font-size:10px;color:#e3b341;margin-bottom:8px\'>&#x2640; Damentage ausgeschlossen</div>';
    o+='<div class=\'bg\'>';
    for(var i=0;i<d.bestW.length;i++){var x=d.bestW[i];var di=DAYS.indexOf(x.day);o+='<div class=\'bi\'><div style=\'width:18px;font-size:13px;text-align:center\'>'+med[i]+'</div><div class=\'bb\' style=\'background:'+clr(x.avg)+';color:'+tc(x.avg)+'\'>'+x.avg+'</div><div style=\'flex:1\'><div class=\'bt\'>'+DS[di]+' '+x.from+' &ndash; '+x.to+'</div><div class=\'bs\'>&Oslash; '+x.avg+'% &middot; '+x.min+'&ndash;'+x.max+'%</div><div style=\'display:flex;align-items:flex-end;gap:1px;margin-top:3px;height:16px\'>'+miniBar(x.profile)+'</div></div></div>';}
    o+='</div></div>';
  }
  o+='<div class=\'ft\'>Auslastung = Personen / Max &middot; BY Feiertage 2026</div>';
  document.getElementById('a').innerHTML=o;
  bindEvents(d,mobile);
}

function drawBWOverlay(bestKey){
  var old=document.querySelectorAll('.bw-overlay');for(var i=0;i<old.length;i++)old[i].remove();
  if(!showBW||!bestKey)return;
  var fid='c_'+bestKey.day+'_'+TS[bestKey.from].replace(':','');var lid='c_'+bestKey.day+'_'+TS[bestKey.to-1].replace(':','');
  var fe=document.getElementById(fid);var le=document.getElementById(lid);var hw=document.getElementById('hw');
  if(!fe||!le||!hw)return;
  var fr=fe.getBoundingClientRect();var lr=le.getBoundingClientRect();var hr=hw.getBoundingClientRect();
  var ov=document.createElement('div');ov.className='bw-overlay';
  ov.style.left=(Math.min(fr.left,lr.left)-hr.left-3+hw.scrollLeft)+'px';ov.style.top=(Math.min(fr.top,lr.top)-hr.top-3)+'px';
  ov.style.width=(Math.max(fr.right,lr.right)-Math.min(fr.left,lr.left)+6)+'px';ov.style.height=(Math.max(fr.bottom,lr.bottom)-Math.min(fr.top,lr.top)+6)+'px';
  hw.appendChild(ov);
}

function bindEvents(d,mobile){
  document.getElementById('tExcl').onclick=function(){exclOn=!exclOn;render();};
  document.getElementById('tBW').onclick=function(){showBW=!showBW;render();};
  document.getElementById('tConf').onclick=function(){showConf=!showConf;render();};
  var pills=document.querySelectorAll('.pill');for(var i=0;i<pills.length;i++){(function(p){p.onclick=function(){wFilt=p.getAttribute('data-w');render();};})(pills[i]);}
  var tp=document.getElementById('tp');var cells=document.querySelectorAll('.c:not(.e):not(.dam)');
  for(var i=0;i<cells.length;i++){(function(el){
    var tipH=function(){var n=parseInt(el.getAttribute('data-n'));return'<b>'+el.getAttribute('data-d')+' '+el.getAttribute('data-t')+'</b>&Oslash; '+el.getAttribute('data-a')+'% &middot; '+el.getAttribute('data-mi')+'&ndash;'+el.getAttribute('data-mx')+'%<br>'+(n<2?'&#x26A0;&#xFE0F; 1 Messpunkt':'&#x2713; '+n+' Messpunkte');};
    el.ontouchstart=function(e){e.preventDefault();tp.innerHTML=tipH();var r=el.getBoundingClientRect();tp.style.left=Math.min(r.left,innerWidth-170)+'px';tp.style.top=Math.max(0,r.top-70)+'px';tp.className='tp show';};
    el.onmouseenter=function(e){tp.innerHTML=tipH();tp.style.left=Math.min(e.clientX+12,innerWidth-170)+'px';tp.style.top=(e.clientY-60)+'px';tp.className='tp show';};
    el.onmousemove=function(e){tp.style.left=Math.min(e.clientX+12,innerWidth-170)+'px';tp.style.top=(e.clientY-60)+'px';};
    el.onmouseleave=function(){tp.className='tp';};
  })(cells[i]);}
  document.ontouchstart=function(e){if(!e.target.classList.contains('c'))tp.className='tp';};
  drawBWOverlay(d.bestKey);
}
function pick(el){sel=el.getAttribute('data-name');render();}
var rt;window.onresize=function(){clearTimeout(rt);rt=setTimeout(function(){if(raw.length)render();},200);};
fetchAll();
</script>
