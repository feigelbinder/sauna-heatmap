<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🧖 München Sauna Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--brd:#30363d;--tx:#c9d1d9;--txm:#8b949e;--acc:#58a6ff;--pos:#3fb950;--warn:#d29922;--fav:#e3b341}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;padding:12px;min-height:100vh;-webkit-text-size-adjust:100%}
h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:6px}
h1 span{font-size:12px;font-weight:400;color:var(--txm)}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.controls{display:flex;gap:6px;align-items:center}
.meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;font-size:10px}
.badge{padding:2px 6px;border-radius:4px;font-weight:500;font-size:10px}
.badge-live{background:rgba(63,185,80,.15);color:var(--pos)}
.badge-rt{background:rgba(88,166,255,.15);color:var(--acc)}

/* Jetzt Gehen Widget */
.now-wrap{overflow-x:auto;margin-bottom:14px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.now-grid{display:flex;gap:8px;min-width:min-content}
.now-card{background:var(–card);border:1px solid var(–brd);border-radius:10px;padding:10px 12px;min-width:120px;flex-shrink:0;position:relative}
.now-card.best{border-color:var(–pos);box-shadow:0 0 12px rgba(63,185,80,.2)}
.now-card .pct{font-size:22px;font-weight:700;margin-bottom:2px}
.now-card .name{font-size:11px;font-weight:600;white-space:nowrap}
.now-card .pers{font-size:10px;color:var(–txm)}
.now-card .tag{position:absolute;top:6px;right:6px;font-size:8px;background:var(–pos);color:#000;padding:1px 5px;border-radius:3px;font-weight:700}
.now-time{font-size:10px;color:var(–txm);margin-bottom:6px}

.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.fg{flex:1;min-width:130px}
.filters label{font-size:10px;color:var(–txm);display:block;margin-bottom:3px}
.filters select,.filters textarea,.filters input[type=text]{background:var(–card);color:var(–tx);border:1px solid var(–brd);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;width:100%}
.filters textarea{font-size:10px;resize:none;height:32px;line-height:1.4}
.chk{font-size:11px;color:var(–txm);display:flex;align-items:center;gap:4px;cursor:pointer}
.chk input{accent-color:var(–acc)}
.pill-group{display:flex;gap:0;border:1px solid var(–brd);border-radius:6px;overflow:hidden}
.pill{padding:5px 10px;font-size:11px;cursor:pointer;background:var(–card);color:var(–txm);border:none;font-family:inherit}
.pill.active{background:var(–acc);color:#fff}
button{background:var(–card);color:var(–tx);border:1px solid var(–brd);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:500}
button.primary{background:var(–acc);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600}

.hm-wrap{overflow-x:auto;padding-bottom:4px}
table{border-collapse:separate;border-spacing:2px}
th{font-size:9px;color:var(–txm);font-weight:400;text-align:center;padding:2px}
.day-label{font-size:11px;font-weight:600;padding-right:4px;text-align:right;white-space:nowrap;vertical-align:middle}
.spark-cell{padding:0 6px 0 0;vertical-align:middle}
.time-label{font-size:10px;color:var(–txm);padding-right:6px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.cell{border-radius:3px;text-align:center;font-size:9px;font-weight:500;cursor:pointer;transition:outline .1s;-webkit-tap-highlight-color:transparent;position:relative}
.cell:hover,.cell.active{outline:2px solid var(–acc);outline-offset:-1px}
.cell.empty,.cell.closed{cursor:default;background:rgba(255,255,255,.02)!important;color:transparent!important}
.cell.empty:hover,.cell.closed:hover{outline:none}
.cell.low-conf{opacity:.55;border:1px dashed rgba(255,255,255,.15)}
.cell.fav{box-shadow:inset 0 0 0 2px var(–fav)}
.cell .trend{position:absolute;top:0;right:1px;font-size:7px;line-height:1}
.desktop-hm th,.desktop-hm .cell{width:28px;min-width:28px;height:26px}
.mobile-hm th{padding:4px 2px;font-size:11px;font-weight:600}
.mobile-hm .cell{height:26px;min-width:36px}
.mobile-hm .time-label{font-size:10px;padding:4px 6px 4px 0;position:sticky;left:0;background:var(–bg);z-index:1}

.legend{display:flex;align-items:center;gap:6px;margin:8px 0 16px;font-size:10px;color:var(–txm);flex-wrap:wrap}
.legend-bar{display:flex;height:12px;border-radius:3px;overflow:hidden;width:140px}
.best{background:var(–card);border:1px solid var(–brd);border-radius:10px;padding:12px;max-width:700px;margin-bottom:14px}
.best h3{font-size:13px;font-weight:600;margin-bottom:2px}
.best .sub{font-size:10px;color:var(–txm);margin-bottom:10px}
.best-grid{display:grid;grid-template-columns:1fr;gap:6px}
.best-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(–bg);border-radius:8px;border:1px solid var(–brd)}
.best-rank{width:18px;font-size:13px;text-align:center;flex-shrink:0}
.best-badge{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.best-text{font-size:12px;font-weight:600}.best-sub{font-size:10px;color:var(–txm)}

/* Compare */
.compare{background:var(–card);border:1px solid var(–brd);border-radius:10px;padding:12px;margin-bottom:14px}
.compare h3{font-size:13px;font-weight:600;margin-bottom:8px;cursor:pointer}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cmp-side{overflow-x:auto}
.cmp-side h4{font-size:12px;font-weight:600;margin-bottom:6px;color:var(–acc)}
.cmp-side table .cell{width:12px;height:12px;min-width:12px;font-size:0}
.cmp-side table{border-spacing:1px}
.cmp-side th{font-size:7px}
.cmp-side .day-label{font-size:9px}

.detail{position:fixed;z-index:999;background:#1c2333;border:1px solid var(–brd);border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:160px;display:none}
.detail.show{display:block}
.detail h4{font-weight:700;margin-bottom:6px;font-size:13px}
.detail .grid{display:grid;grid-template-columns:auto auto;gap:3px 14px;font-size:11px}
.detail .lbl{color:var(–txm)}.detail .val{font-weight:600}
.loading{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center}
.loading .icon{font-size:48px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.error{min-height:50vh;display:flex;align-items:center;justify-content:center;padding:16px}
.error-box{background:var(–card);border:1px solid var(–brd);border-radius:12px;padding:24px;max-width:400px;text-align:center;width:100%}
.debug{background:var(–card);border:1px solid var(–brd);border-radius:6px;padding:10px;margin-bottom:12px;font-size:10px;font-family:monospace;color:var(–txm);max-height:160px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.section-toggle{cursor:pointer;user-select:none}
.section-toggle::before{content:“▸ “;font-size:10px}
.section-toggle.open::before{content:“▾ “}
.footer{margin-top:20px;font-size:9px;color:var(–txm);text-align:center}
@media(min-width:640px){
body{padding:16px}h1{font-size:22px}.meta{font-size:11px}
.best-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.now-card{min-width:130px}
}
@media(max-width:639px){.cmp-grid{grid-template-columns:1fr}}
</style>

</head>
<body>
<div id="app"></div>
<div class="detail" id="tip"><h4 id="tipTitle"></h4><div class="grid"><span class="lbl">Ø Auslastung</span><span class="val" id="tipAvg"></span><span class="lbl">Min – Max</span><span id="tipRange"></span><span class="lbl">Messpunkte</span><span id="tipN"></span><span class="lbl">Konfidenz</span><span id="tipConf"></span><span class="lbl">Trend</span><span id="tipTrend"></span></div></div>

<script>
const API="https://script.google.com/macros/s/AKfycbxpjTpkOgwSW_b6Jrk0CwokHlG6YYy9JMcEBlqPsr2_D-LY2fLDOxSuw14SACfdRaY/exec";
const TICOS="https://counter.ticos-systems.cloud/api/gates/counter";
const SWM=[{id:"30191",n:"Cosimawellenbad"},{id:"30200",n:"Dantebad"},{id:"30203",n:"Michaelibad"},{id:"30204",n:"Müllersches Volksbad"},{id:"30185",n:"Nordbad"},{id:"30188",n:"Südbad"},{id:"30207",n:"Westbad"}];
const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const DS={Montag:"Mo",Dienstag:"Di",Mittwoch:"Mi",Donnerstag:"Do",Freitag:"Fr",Samstag:"Sa",Sonntag:"So"};
const DAYMAP={monday:"Montag",tuesday:"Dienstag",wednesday:"Mittwoch",thursday:"Donnerstag",friday:"Freitag",saturday:"Samstag",sunday:"Sonntag"};
const TS=[];for(let h=6;h<24;h++){TS.push(z(h)+":00");TS.push(z(h)+":30")}
function z(n){return String(n).padStart(2,"0")}
function addS(t,n){const[h,m]=t.split(":").map(Number);let th=h,tm=m+n*30;th+=Math.floor(tm/60);tm%=60;return z(th)+":"+z(tm)}
const BAYERN="01.01.2026, 06.01.2026, 03.04.2026, 06.04.2026, 01.05.2026, 14.05.2026, 25.05.2026, 04.06.2026, 15.08.2026, 03.10.2026, 01.11.2026, 25.12.2026, 26.12.2026";
const WIN=7;

function clr(v){if(v==null||isNaN(v))return"rgba(255,255,255,.04)";v=Math.max(0,Math.min(100,v));return`hsl(${120-v*1.2},${60+v*.3}%,${18+v*.18}%)`}
function tc(v){return v!=null&&v>50?"rgba(255,255,255,.95)":"rgba(255,255,255,.7)"}
function extractTime(v){if(v==null)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}T/.test(s)){const m=s.match(/T(\d{2}):(\d{2})/);if(m){let h=parseInt(m[1]),mn=parseInt(m[2]);h+=2;if(h>=24)h-=24;return rT(h,mn)}return null}const m=s.replace(/\s*uhr/i,"").split(":");if(m.length>=2){const h=parseInt(m[0]),mn=parseInt(m[1]);if(!isNaN(h)&&!isNaN(mn))return rT(h,mn)}return null}
function rT(h,m){const rm=m<15?0:m<45?30:0;if(m>=45)h++;if(h>=24||h<0)return null;return z(h)+":"+z(rm)}
function extractDay(v){if(v==null)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s)){const d=new Date(s);if(isNaN(d))return null;return DAYS[[6,0,1,2,3,4,5][d.getDay()]]}const l=s.toLowerCase();if(DAYMAP[l])return DAYMAP[l];return DAYS.find(x=>x.toLowerCase()===l||x.toLowerCase().startsWith(l.slice(0,3)))||null}
function extractDatum(v){if(v==null)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(s)){const d=new Date(s);if(isNaN(d))return null;return z(d.getDate())+"."+z(d.getMonth()+1)+"."+d.getFullYear()}return s}
function datumISO(d){if(!d)return null;const p=d.split(".");return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:null}
function fCol(row,cs){const ks=Object.keys(row);for(const c of cs){if(row[c]!==undefined)return c}for(const c of cs){const f=ks.find(k=>k.toLowerCase().replace(/[^a-z0-9äöü]/g,"").includes(c.toLowerCase().replace(/[^a-z0-9äöü]/g,"")));if(f)return f}return null}

// State
let raw=[],liveData=null,weatherData=null,autoInt=null;
let sel="__all__",excl=BAYERN,showN=true,showDbg=false,weatherFilter="all";
let cmpA="",cmpB="",cmpOpen=false;
let favs=new Set(JSON.parse(localStorage.getItem("sauna_favs")||"[]"));
const saveFavs=()=>localStorage.setItem("sauna_favs",JSON.stringify([...favs]));
const $=id=>document.getElementById(id);
const mob=()=>window.innerWidth<640;

// --- FETCH ---
async function fetchSheet(){
  const r=await fetch(API,{redirect:"follow"});if(!r.ok)throw new Error("HTTP "+r.status);
  const t=await r.text();const data=JSON.parse(t);
  if(!Array.isArray(data)||!data.length)throw new Error("Leer");
  return data;
}
async function fetchLive(){
  try{
    const ps=SWM.map(s=>fetch(TICOS+"?organizationUnitIds="+s.id,{mode:"cors"}).then(r=>r.json()).then(d=>d&&d[0]?{name:s.n,cur:d[0].personCount,max:d[0].maxPersonCount,pct:Math.round(d[0].personCount/d[0].maxPersonCount*100)}:null).catch(()=>null));
    const res=(await Promise.all(ps)).filter(Boolean);
    return res.length?res:null;
  }catch(e){return null}
}
async function fetchWeather(dates){
  try{
    const isos=dates.map(datumISO).filter(Boolean).sort();
    if(!isos.length)return null;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=48.14&longitude=11.58&daily=precipitation_sum,weathercode&timezone=Europe/Berlin&past_days=30&forecast_days=1`;
    const r=await fetch(url);const d=await r.json();
    if(!d.daily)return null;
    const map={};
    d.daily.time.forEach((t,i)=>{
      const dd=z(new Date(t).getDate())+"."+z(new Date(t).getMonth()+1)+"."+new Date(t).getFullYear();
      map[dd]={precip:d.daily.precipitation_sum[i],code:d.daily.weathercode[i],rain:d.daily.precipitation_sum[i]>1};
    });
    return map;
  }catch(e){return null}
}

async function fetchAll(){
  $("app").innerHTML=`<div class="loading"><div><div class="icon">🧖</div><div>Lade Daten...</div></div></div>`;
  try{
    const[sheet,live]=await Promise.all([fetchSheet(),fetchLive()]);
    raw=sheet;liveData=live;
    const allDates=[...new Set(raw.map(r=>{const c=fCol(r,["Datum"]);return c?extractDatum(r[c]):null}).filter(Boolean))];
    weatherData=await fetchWeather(allDates);
    render();
  }catch(e){
    $("app").innerHTML=`<div class="error"><div class="error-box"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div>${e.message}</div><button class="primary" onclick="fetchAll()" style="margin-top:12px">↻ Retry</button></div></div>`;
  }
}

// --- PROCESS ---
function process(saunaFilter){
  if(!raw.length)return{saunas:[],hm:{},bestW:[],stats:{}};
  const r0=raw[0],cS=fCol(r0,["Sauna"]),cD=fCol(r0,["Wochentag"]),cT=fCol(r0,["Uhrzeit"]);
  const cA=fCol(r0,["Auslastung %","Auslastung%","Auslastung"]),cDt=fCol(r0,["Datum"]),cP=fCol(r0,["Personen"]),cM=fCol(r0,["Max Kapazitaet","Max Kapazität"]);
  const exSet=new Set(excl.split(/[,;\n]/).map(d=>d.trim()).filter(Boolean));
  const sf=saunaFilter||sel;
  let fd=raw.filter(row=>{
    if(cDt&&exSet.size>0){const dt=extractDatum(row[cDt]);if(dt&&exSet.has(dt))return false}
    if(sf!=="__all__"&&row[cS]!==sf)return false;
    // Weather filter
    if(weatherFilter!=="all"&&weatherData&&cDt){
      const dt=extractDatum(row[cDt]);
      const w=dt?weatherData[dt]:null;
      if(w){if(weatherFilter==="sun"&&w.rain)return false;if(weatherFilter==="rain"&&!w.rain)return false}
    }
    return true;
  });
  const saunas=[...new Set(raw.map(r=>r[cS]).filter(Boolean))].sort();
  const grp={},grpByDate={};
  fd.forEach(row=>{
    const day=extractDay(cD?row[cD]:null),time=extractTime(cT?row[cT]:null),datum=cDt?extractDatum(row[cDt]):null;
    if(!day||!time)return;
    let pct=Number(row[cA]);
    if(isNaN(pct)&&cP&&cM&&Number(row[cM])>0)pct=Math.round(Number(row[cP])/Number(row[cM])*100);
    if(isNaN(pct))return;
    const k=day+"|"+time;if(!grp[k])grp[k]=[];grp[k].push(pct);
    if(datum){if(!grpByDate[k])grpByDate[k]={};if(!grpByDate[k][datum])grpByDate[k][datum]=[];grpByDate[k][datum].push(pct)}
  });
  const hm={};for(const[k,vs]of Object.entries(grp)){
    const avg=Math.round(vs.reduce((a,b)=>a+b,0)/vs.length);
    // Trend: compare first half dates vs second half
    let trend="";
    const dts=grpByDate[k]?Object.keys(grpByDate[k]).sort():[];
    if(dts.length>=4){
      const mid=Math.floor(dts.length/2);
      const a1=dts.slice(0,mid).flatMap(d=>grpByDate[k][d]);
      const a2=dts.slice(mid).flatMap(d=>grpByDate[k][d]);
      const m1=a1.reduce((a,b)=>a+b,0)/a1.length,m2=a2.reduce((a,b)=>a+b,0)/a2.length;
      if(m2>m1+5)trend="↗";else if(m2<m1-5)trend="↘";else trend="→";
    }
    hm[k]={avg,min:Math.min(...vs),max:Math.max(...vs),n:vs.length,trend};
  }
  // Best windows
  const bestW=[];
  for(const day of DAYS){for(let i=0;i<=TS.length-WIN;i++){
    const vals=[];let ok=true;
    for(let j=0;j<WIN;j++){const c=hm[day+"|"+TS[i+j]];if(!c||c.avg<=0){ok=false;break}vals.push(c.avg)}
    if(!ok||vals.length<WIN)continue;
    const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    bestW.push({day,from:TS[i],to:addS(TS[i],WIN),avg,min:Math.min(...vals),max:Math.max(...vals),profile:vals});
  }}
  bestW.sort((a,b)=>a.avg-b.avg);
  const allDates=fd.map(r=>extractDatum(r[cDt])).filter(Boolean).sort();
  return{saunas,hm,bestW:bestW.slice(0,6),stats:{rows:fd.length,from:allDates[0]||"",to:allDates[allDates.length-1]||""}};
}

// --- RENDER HELPERS ---
function spark(hm,day,w,h){
  const vals=TS.map(t=>{const c=hm[day+"|"+t];return c&&c.avg>0?c.avg:0});
  if(vals.every(v=>v===0))return"";
  const mx=Math.max(...vals,1);
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-1-(v/mx)*(h-2)}`).join(" ");
  return`<svg width="${w}" height="${h}" style="vertical-align:middle;opacity:.6"><polyline points="${pts}" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function miniBar(p,mh){const mx=Math.max(...p,1);return p.map(v=>{const h=Math.max(2,Math.round(v/mx*mh));return`<div style="width:4px;height:${h}px;background:${clr(v)};border-radius:1px"></div>`}).join("")}
function cellH(c,day,time,mini){
  if(!c)return`<td class="cell empty"></td>`;
  if(c.avg<=0)return`<td class="cell closed"></td>`;
  const conf=c.n<3?"low-conf":"";
  const fav=favs.has(day+"|"+time)?"fav":"";
  const sz=mini?"":(showN?c.avg:"");
  const tr=c.trend&&!mini?`<span class="trend">${c.trend}</span>`:"";
  return`<td class="cell ${conf} ${fav}" style="background:${clr(c.avg)};color:${tc(c.avg)}" data-day="${day}" data-time="${time}" data-avg="${c.avg}" data-min="${c.min}" data-max="${c.max}" data-n="${c.n}" data-trend="${c.trend||""}">${sz}${tr}</td>`;
}

// --- MAIN RENDER ---
function render(){
  const d=process();const now=new Date().toLocaleTimeString("de-DE");const mobile=mob();
  const sLabel=sel==="__all__"?"Alle Saunen":sel;
  let h=`<div class="header"><h1>🧖 Sauna Heatmap <span>München</span></h1><div class="controls"><label class="chk"><input type="checkbox" id="autoChk" ${autoInt?"checked":""}>Auto</label><button onclick="fetchAll()">↻</button></div></div>
  <div class="meta"><span class="badge badge-live">🔴 Live</span><span style="color:var(--txm)">${now} · ${d.stats.from?d.stats.from+" – "+d.stats.to:""}</span></div>`;

  // --- JETZT GEHEN? ---
  if(liveData&&liveData.length){
    const sorted=[...liveData].sort((a,b)=>a.pct-b.pct);
    h+=`<div class="now-time">🚀 <strong>Jetzt gehen?</strong> <span class="badge badge-rt">Echtzeit via Ticos API</span></div><div class="now-wrap"><div class="now-grid">`;
    sorted.forEach((s,i)=>{
      h+=`<div class="now-card${i===0?" best":""}"><div class="pct" style="color:${clr(s.pct)}">${s.pct}%</div><div class="name">${s.name}</div><div class="pers">${s.cur}/${s.max} 👤</div>${i===0?'<div class="tag">GO!</div>':""}</div>`;
    });
    h+=`</div></div>`;
  }else{
    // Fallback: latest from sheet
    const latest=getLatestFromSheet();
    if(latest.length){
      const sorted=[...latest].sort((a,b)=>a.pct-b.pct);
      h+=`<div class="now-time">🚀 <strong>Jetzt gehen?</strong> <span style="color:var(--txm)">(letzte Messung)</span></div><div class="now-wrap"><div class="now-grid">`;
      sorted.forEach((s,i)=>{
        h+=`<div class="now-card${i===0?" best":""}"><div class="pct" style="color:${clr(s.pct)}">${s.pct}%</div><div class="name">${s.name}</div><div class="pers">${s.cur}/${s.max} 👤</div>${i===0?'<div class="tag">GO!</div>':""}</div>`;
      });
      h+=`</div></div>`;
    }
  }

  // --- FILTERS ---
  const hasWeather=weatherData&&Object.keys(weatherData).length>0;
  h+=`<div class="filters">
    <div class="fg"><label>Sauna</label><select id="saunaSel"><option value="__all__">Alle Saunen (Ø)</option>${d.saunas.map(s=>`<option value="${s}"${s===sel?" selected":""}>${s}</option>`).join("")}</select></div>
    <div class="fg"><label>Feiertage ausschließen</label><textarea id="exclIn">${excl}</textarea></div>

```
${hasWeather?`<div><label>Wetter</label><div class="pill-group"><button class="pill${weatherFilter==="all"?" active":""}" data-w="all">Alle</button><button class="pill${weatherFilter==="sun"?" active":""}" data-w="sun">☀️</button><button class="pill${weatherFilter==="rain"?" active":""}" data-w="rain">🌧️</button></div></div>`:""}
<label class="chk"><input type="checkbox" id="numChk" ${showN?"checked":""}> %</label>
```

  </div>`;

// — HEATMAP —
h+=`<div class="hm-wrap">`;
if(mobile){
h+=`<table class="mobile-hm"><thead><tr><th class="time-label"></th>`;
for(const day of DAYS)h+=`<th>${DS[day]}</th>`;
h+=`</tr></thead><tbody>`;
for(const time of TS){
const isH=time.endsWith(”:00”);
h+=`<tr><td class="time-label" style="${isH?"font-weight:600;color:var(--tx)":""}">${isH?time:""}</td>`;
for(const day of DAYS)h+=cellH(d.hm[day+”|”+time],day,time);
h+=`</tr>`;
}
h+=`</tbody></table>`;
}else{
h+=`<table class="desktop-hm"><thead><tr><th></th><th></th>${TS.map(t=>`<th>${t.endsWith(”:00”)?t.slice(0,-3):””}</th>`).join("")}</tr></thead><tbody>`;
for(const day of DAYS){
const has=TS.some(t=>d.hm[day+”|”+t]&&d.hm[day+”|”+t].avg>0);
h+=`<tr><td class="day-label" style="opacity:${has?1:.3}">${DS[day]}</td><td class="spark-cell">${spark(d.hm,day,56,16)}</td>`;
for(const time of TS)h+=cellH(d.hm[day+”|”+time],day,time);
h+=`</tr>`;
}
h+=`</tbody></table>`;
}
h+=`</div>`;

// — LEGEND —
let lp=””;for(let i=0;i<20;i++)lp+=`<div style="flex:1;background:${clr(i*5)}"></div>`;
h+=`<div class="legend"><span>0%</span><div class="legend-bar">${lp}</div><span>100%</span><span style="color:var(--pos)">■ leer</span><span style="color:hsl(60,85%,36%)">■ mittel</span><span style="color:hsl(0,85%,36%)">■ voll</span><span style="opacity:.5;border:1px dashed rgba(255,255,255,.3);padding:0 4px;border-radius:2px;margin-left:4px">wenig Daten</span><span style="box-shadow:inset 0 0 0 2px var(--fav);padding:0 4px;border-radius:2px">★ Favorit</span></div>`;

// — BEST WINDOWS —
if(d.bestW.length){
const med=[“🥇”,“🥈”,“🥉”,“4.”,“5.”,“6.”];
h+=`<div class="best"><h3>🎯 Beste 3,5h-Fenster · ${sLabel}</h3><div class="sub">Doppelklick auf Zelle = Favorit markieren</div><div class="best-grid">`;
for(let i=0;i<d.bestW.length;i++){const x=d.bestW[i];
h+=`<div class="best-item"><div class="best-rank">${med[i]}</div><div class="best-badge" style="background:${clr(x.avg)};color:${tc(x.avg)}">Ø${x.avg}</div><div style="flex:1"><div class="best-text">${DS[x.day]} ${x.from} – ${x.to}</div><div class="best-sub">Ø ${x.avg}% · ${x.min}–${x.max}%</div><div style="display:flex;align-items:flex-end;gap:1px;margin-top:3px;height:16px">${miniBar(x.profile,16)}</div></div></div>`;
}
h+=`</div></div>`;
}

// — COMPARE —
h+=`<div class="compare"><h3 class="section-toggle${cmpOpen?" open":""}" id="cmpToggle">Sauna-Vergleich</h3>`;
if(cmpOpen){
if(!cmpA&&d.saunas.length>=2){cmpA=d.saunas[0];cmpB=d.saunas[1]}
h+=`<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap"> <select id="cmpSelA" style="background:var(--card);color:var(--tx);border:1px solid var(--brd);border-radius:6px;padding:4px 8px;font-size:12px">${d.saunas.map(s=>`<option${s===cmpA?” selected”:””}>${s}</option>`).join("")}</select> <span style="color:var(--txm);font-size:12px;padding-top:4px">vs</span> <select id="cmpSelB" style="background:var(--card);color:var(--tx);border:1px solid var(--brd);border-radius:6px;padding:4px 8px;font-size:12px">${d.saunas.map(s=>`<option${s===cmpB?” selected”:””}>${s}</option>`).join("")}</select> </div><div class="cmp-grid">`;
[cmpA,cmpB].forEach(sn=>{
const cd=process(sn);
h+=`<div class="cmp-side"><h4>${sn}</h4><table><thead><tr><th></th>${TS.filter((_,i)=>i%2===0).map(t=>`<th>${t.slice(0,-3)}</th>`).join("")}</tr></thead><tbody>`;
for(const day of DAYS){
h+=`<tr><td style="font-size:8px;text-align:right;padding-right:3px;color:var(--txm)">${DS[day]}</td>`;
TS.filter((_,i)=>i%2===0).forEach(time=>{
const c=cd.hm[day+”|”+time];
h+=c&&c.avg>0?`<td class="cell" style="background:${clr(c.avg)}"></td>`:`<td class="cell empty"></td>`;
});
h+=`</tr>`;
}
h+=`</tbody></table></div>`;
});
h+=`</div>`;
}
h+=`</div>`;

// — FAV SUMMARY —
if(favs.size>0){
const favList=[…favs].map(k=>{const[day,time]=k.split(”|”);const c=d.hm[k];return c?{day,time,avg:c.avg}:null}).filter(Boolean).sort((a,b)=>a.avg-b.avg);
if(favList.length){
h+=`<div style="margin-top:14px;font-size:12px"><strong style="color:var(--fav)">★ Deine Favoriten:</strong> `;
h+=favList.map(f=>`<span style="background:var(--card);padding:2px 8px;border-radius:4px;margin:2px;display:inline-block;border:1px solid var(--brd)">${DS[f.day]} ${f.time} <span style="color:${clr(f.avg)}">${f.avg}%</span></span>`).join(” “);
h+=`</div>`;
}
}

h+=`<div class="footer">Ø über alle erfassten Tage · Doppelklick = Favorit · ◼ wenig Daten = <3 Messpunkte</div>`;
$(“app”).innerHTML=h;
bindEvents(d,mobile);
}

function getLatestFromSheet(){
if(!raw.length)return[];
const r0=raw[0],cS=fCol(r0,[“Sauna”]),cDt=fCol(r0,[“Datum”]),cT=fCol(r0,[“Uhrzeit”]),cP=fCol(r0,[“Personen”]),cM=fCol(r0,[“Max Kapazitaet”,“Max Kapazität”]),cA=fCol(r0,[“Auslastung %”,“Auslastung%”,“Auslastung”]);
// Find latest date+time
let latestKey=””,latestRows=[];
raw.forEach(row=>{
const dt=extractDatum(row[cDt])||””,tm=extractTime(row[cT])||””;
const k=dt+”|”+tm;
if(k>latestKey){latestKey=k;latestRows=[row]}
else if(k===latestKey)latestRows.push(row);
});
return latestRows.map(row=>({name:row[cS],cur:Number(row[cP])||0,max:Number(row[cM])||1,pct:Number(row[cA])||0})).filter(r=>r.name);
}

function bindEvents(d,mobile){
$(“saunaSel”).onchange=e=>{sel=e.target.value;render()};
$(“exclIn”).oninput=e=>{excl=e.target.value;render()};
$(“numChk”).onchange=e=>{showN=e.target.checked;render()};
$(“autoChk”).onchange=e=>{if(e.target.checked)autoInt=setInterval(fetchAll,3e5);else{clearInterval(autoInt);autoInt=null}};
$(“cmpToggle”).onclick=()=>{cmpOpen=!cmpOpen;render()};
if($(“cmpSelA”)){$(“cmpSelA”).onchange=e=>{cmpA=e.target.value;render()};$(“cmpSelB”).onchange=e=>{cmpB=e.target.value;render()}}
document.querySelectorAll(”.pill”).forEach(p=>p.onclick=()=>{weatherFilter=p.dataset.w;render()});

// Cell interactions
const tip=$(“tip”),cells=document.querySelectorAll(”.cell:not(.empty):not(.closed)”);
// Tooltip
if(mobile){
cells.forEach(el=>{el.ontouchstart=e=>{
e.preventDefault();document.querySelectorAll(”.cell.active”).forEach(c=>c.classList.remove(“active”));el.classList.add(“active”);
showTip(el);const r=el.getBoundingClientRect();tip.style.left=Math.min(r.left,innerWidth-180)+“px”;tip.style.top=Math.max(0,r.top-100)+“px”;tip.classList.add(“show”);
}});
document.ontouchstart=e=>{if(!e.target.classList.contains(“cell”)){tip.classList.remove(“show”);document.querySelectorAll(”.cell.active”).forEach(c=>c.classList.remove(“active”))}};
}else{
cells.forEach(el=>{
el.onmouseenter=e=>{showTip(el);tip.classList.add(“show”);tip.style.left=Math.min(e.clientX+14,innerWidth-190)+“px”;tip.style.top=(e.clientY-100)+“px”};
el.onmousemove=e=>{tip.style.left=Math.min(e.clientX+14,innerWidth-190)+“px”;tip.style.top=(e.clientY-100)+“px”};
el.onmouseleave=()=>tip.classList.remove(“show”);
});
}
// Double-click = fav toggle
cells.forEach(el=>{el.ondblclick=()=>{
const k=el.dataset.day+”|”+el.dataset.time;
if(favs.has(k))favs.delete(k);else favs.add(k);
saveFavs();render();
}});
}
function showTip(el){
$(“tipTitle”).textContent=el.dataset.day+” · “+el.dataset.time;
$(“tipAvg”).textContent=el.dataset.avg+”%”;
$(“tipRange”).textContent=el.dataset.min+”% – “+el.dataset.max+”%”;
$(“tipN”).textContent=el.dataset.n;
$(“tipConf”).textContent=Number(el.dataset.n)<3?“⚠️ wenig Daten”:“✓ solide”;
$(“tipTrend”).textContent=el.dataset.trend||“noch zu wenig Daten”;
}

let resizeT;window.onresize=()=>{clearTimeout(resizeT);resizeT=setTimeout(()=>{if(raw.length)render()},200)};
fetchAll();
</script>
